version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo_db
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo_db"]
      interval: 5s
      timeout: 2s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: 'postgresql://todo:todo@db:5432/todo_db?schema=public'
      CORS_ORIGIN: 'http://52.194.34.190'
    command: sh -c "sleep 10 && npm run start:prod"
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../
      dockerfile: Dockerfile.prod
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
